<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trade App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background:#111;color:white;font-family:sans-serif;text-align:center">

<h1>🐾 Trade App</h1>

<input id="search" placeholder="Поиск питомца..." style="padding:10px;width:80%"><br><br>

<div id="pets"></div>

<script>
async function loadPets() {
    const res = await fetch("/pets");
    const data = await res.json();

    const container = document.getElementById("pets");
    container.innerHTML = "";

    data.forEach(p => {
        const div = document.createElement("div");
        div.innerHTML = `
            <div style="padding:10px;border:1px solid #444;margin:5px">
                ${p.name} - 💎 ${p.value}
            </div>
        `;
        container.appendChild(div);
    });
}

loadPets();
</script>

</body>
</html>
