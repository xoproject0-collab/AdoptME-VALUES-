<!DOCTYPE html>
<html>

<head>

<title>Adopt Me Trade</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
}

input{
width:100%;
padding:10px;
margin-bottom:20px;
}

.pet{
border:1px solid #444;
padding:10px;
margin:5px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>Pet Values</h2>

<input id="search" placeholder="Search pet">

<div id="pets"></div>

<script>

let pets=[]

async function loadPets(){

const res = await fetch("/pets")

pets = await res.json()

renderPets(pets)

}

function renderPets(list){

const container=document.getElementById("pets")

container.innerHTML=""

list.slice(0,100).forEach(p=>{

const div=document.createElement("div")

div.className="pet"

div.innerHTML="🐾 "+p.name+" — 💎 "+p.value

container.appendChild(div)

})

}

document.getElementById("search").addEventListener("input",(e)=>{

const text=e.target.value.toLowerCase()

const filtered=pets.filter(p=>p.name.toLowerCase().includes(text))

renderPets(filtered)

})

loadPets()

</script>

</body>

</html>
